seed: ~

model:
  target: src.models.colar.LitCoLaR
  model_kwargs:
    # ── Switch the backbone to Qwen2.5-VL ────────────────────────────────────
    # Use the model name exactly as it appears in your local models directory.
    # e.g. if stored at  <workspace>/models/llms/Qwen2.5-VL-3B-Instruct/
    model_id: Qwen2.5-VL-3B-Instruct
    # model_id: Qwen2.5-VL-7B-Instruct       # larger variant
    # model_id: Qwen3-VL-7B-Instruct          # Qwen3 variant (if available)

    sft_method: colar
    chat_template: False   # VL uses its own chat template via the processor

    # ── LoRA ─────────────────────────────────────────────────────────────────
    do_lora: True
    lora_config:
      r: 128
      lora_alpha: 32
      # Only train the LLM transformer layers, NOT the ViT visual encoder.
      # Qwen2.5-VL names its attention projections exactly as below.
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj

    # ── Latent CoT config (same as text-only) ────────────────────────────────
    latent_cot_config:
      ce_weight: 1
      embed_modeling_weight: 1
      embed_modeling_loss: mse    # {nll, mse}
      entropy_weight: 0
      pred_embed_forward_weight: 0
      max_compression_factor: 5
      pred_compressed_cot: True
      sqrt_mean: True

    # ── Latent Policy ─────────────────────────────────────────────────────────
    latent_policy_config:
      lp_determinisitc: False
      # Qwen2.5-VL-3B hidden size = 2048  (same as Llama-3.2-1B-Instruct)
      # Qwen2.5-VL-7B hidden size = 3584  → change to 3584 for the 7B model
      lp_intermediate_size: 2048

    # ── Generation ────────────────────────────────────────────────────────────
    latent_generation_config:
      max_n_latent_forward: 64
      latent_temperature: 1.0
      compression_factor: 5

    answer_generation_config:
      max_new_tokens: 16
      do_sample: True
      top_p: 0.9
      temperature: 1.0

    # ── RL (optional) ─────────────────────────────────────────────────────────
    do_rl: False
    rl_config:
      average_per_token_loss: False
      random_speed_in_group: False
      filter_dataset: False
      exp_batch_size: 8
      group_size: 8
      punish_latent_length: False
      clip_grad_norm: 1.0
      clip_eps: 0.2
      use_latent_loss: True
      use_answer_loss: True
      n_train_samples_per_epoch: 512

  training_kwargs:
    optimizer:
      target: torch.optim.AdamW
      lr: 1e-4    # lower to 1e-5 for 7B; set to 1e-6 for RL stage
      weight_decay: 0.01
    use_scheduler: False
    scheduler:
      target: constant_schedule_with_warmup
      warmup_steps: 1000

trainer:
  max_epochs: 50

# ── Reduce batch size for VL models (images consume more GPU memory) ─────────
dataloader:
  batch_size: 32          # was 256 for text-only; VL needs smaller batches
  val_batch_size: 8
  num_workers: 4
  pin_memory: True
  persistent_workers: True